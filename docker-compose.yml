services:
  agent:
    build: ./services/agent
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID}
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./services/agent/mcp_weather/data:/app/mcp_weather/data:ro
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_MAPBOX_TOKEN=${MAPBOX_ACCESS_TOKEN}
    depends_on:
      agent:
        condition: service_healthy

networks:
  default:
    name: weather-forecast-network