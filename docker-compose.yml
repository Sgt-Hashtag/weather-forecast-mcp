services:
  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
        DOWNLOAD_PRITHVI2_MODEL: ${DOWNLOAD_PRITHVI2_MODEL:-true}
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID}
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models/huggingface
      - HF_HUB_CACHE=/app/models/huggingface/hub
      - PRITHVI2_MODEL_REPO=ibm-nasa-geospatial/Prithvi-EO-2.0-300M-TL-Sen1Floods11
    env_file:
      - .env
    volumes:
      - ./scripts:/app/scripts
      - ./services/agent/mcp_weather/data:/app/mcp_weather/data:ro
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_MAPBOX_TOKEN=${MAPBOX_ACCESS_TOKEN}
    depends_on:
      agent:
        condition: service_healthy

networks:
  default:
    name: weather-forecast-network
